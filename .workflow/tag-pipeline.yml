version: '1.0'
name: tag-pipeline
displayName: Tag 构建发布
stages:
  - stage:
    name: build_linux
    displayName: 构建 Linux 安装包
    steps:
      - step: build@shell
        name: install_deps
        displayName: 安装系统依赖
        commands:
          - apt-get update && apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev libfuse2 patchelf
        artifacts: []
      - step: build@shell
        name: setup_node
        displayName: 安装 Node.js 20
        commands:
          - curl -fsSL https://deb.nodesource.com/setup_20.x | bash - && apt-get install -y nodejs
          - npm install -g pnpm@10
        artifacts: []
      - step: build@shell
        name: setup_rust
        displayName: 安装 Rust
        commands:
          - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          - . "$HOME/.cargo/env" && rustup default stable
        artifacts: []
      - step: build@shell
        name: build_frontend
        displayName: 构建前端
        commands:
          - pnpm install
          - pnpm build
        artifacts: []
      - step: build@shell
        name: build_sidecar
        displayName: 构建 Python sidecar
        commands:
          - pip install pyinstaller
          - make build-sidecar
        artifacts: []
      - step: build@shell
        name: build_tauri
        displayName: 构建 Tauri Linux 安装包
        commands:
          - . "$HOME/.cargo/env" && pnpm exec tauri build --bundles deb,rpm,appimage
        artifacts:
          - name: BUILD_ARTIFACT
            path:
              - ./src-tauri/target/release/bundle
  - stage:
    name: publish
    displayName: 发布到 Release
    steps:
      - step: publish@release_artifacts
        name: release_artifacts
        displayName: 发布安装包
        dependArtifact: BUILD_ARTIFACT
        version: '${TAG_NAME}'
        autoIncrement: false
triggers:
  push:
    tags:
      include:
        - v*
