name: macOS Build (Triggered by Gitee)

on:
  repository_dispatch:
    types: [gitee-release]

jobs:
  build_macos:
    name: Build macOS DMG
    runs-on: macos-latest

    steps:
      - name: Checkout from Gitee
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.gitee_repo }}
          ref: ${{ github.event.client_payload.gitee_ref }}
          token: ${{ secrets.GITEE_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install qshell
        run: |
          curl -L -o /usr/local/bin/qshell "https://devtools.qiniu.com/darwin/amd64/qshell"
          chmod +x /usr/local/bin/qshell

      - name: Build frontend
        run: |
          pnpm install
          pnpm build

      - name: Build Python sidecar
        run: |
          pip install pyinstaller
          make build-sidecar

      - name: Build macOS Tauri bundle
        run: pnpm exec tauri build --bundles dmg,app

      - name: Upload to Qiniu
        env:
          QINIU_AK: ${{ secrets.QINIU_AK }}
          QINIU_SK: ${{ secrets.QINIU_SK }}
          QINIU_BUCKET: ${{ secrets.QINIU_BUCKET }}
        run: |
          qshell account "${QINIU_AK}" "${QINIU_SK}" ci-user
          TAG="${{ github.event.client_payload.gitee_ref }}"
          find src-tauri/target/release/bundle -type f | while read -r f; do
            rel="${f#src-tauri/target/release/bundle/}"
            qshell rput "${QINIU_BUCKET}" "pc-clinet/${TAG}/macos/${rel}" "$f"
          done
