name: Build Desktop Installers

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bundles: nsis,msi
            artifact_name: windows-bundles
          - os: macos-latest
            bundles: dmg,app
            artifact_name: macos-bundles
          - os: ubuntu-latest
            bundles: deb,rpm,appimage
            artifact_name: linux-bundles

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Linux Tauri deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libxdo-dev

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Install backend deps for sidecar
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r python-backend/requirements.txt pyinstaller

      - name: Build Python sidecar
        working-directory: python-backend
        run: |
          python -m PyInstaller aitoreder-backend.spec --clean --distpath ../src-tauri/binaries

      - name: Verify sidecar resources
        shell: bash
        run: |
          ls -la src-tauri/binaries
          ls -la src-tauri/binaries/aitoreder-backend

      - name: Build Tauri bundles
        run: pnpm exec tauri build --bundles ${{ matrix.bundles }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: src-tauri/target/release/bundle/**
          if-no-files-found: error

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.app.tar.gz
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.rpm
            src-tauri/target/release/bundle/**/*.AppImage
          fail_on_unmatched_files: false

  # ===== 新增：部署到服务器 =====
  deploy:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Install sshpass
        run: sudo apt-get install -y -qq sshpass

      - name: Deploy to server
        env:
          HOST: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
          PASS: ${{ secrets.SERVER_PASSWORD }}
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME}"
          REMOTE_DIR="/opt/downloads/${VERSION}"

          # 远程创建目录
          sshpass -p "$PASS" ssh -o StrictHostKeyChecking=no "${USER}@${HOST}" "mkdir -p ${REMOTE_DIR}"

          # 上传所有构建产物
          sshpass -p "$PASS" scp -o StrictHostKeyChecking=no -r artifacts/*/* "${USER}@${HOST}:${REMOTE_DIR}/"

          # 按平台分类存放并重命名为固定名称
          sshpass -p "$PASS" ssh -o StrictHostKeyChecking=no "${USER}@${HOST}" bash -s "$VERSION" << 'SCRIPT'
            set -e
            VERSION="$1"
            cd /opt/downloads

            # 创建 latest 软链
            ln -sfn "${VERSION}" latest

            # 找各平台文件并创建友好名称的软链
            cd "${VERSION}"

            # Windows
            WIN_EXE=$(find . -name "*.exe" -type f 2>/dev/null | head -1)
            if [ -n "$WIN_EXE" ]; then
              ln -sf "$WIN_EXE" pc_clinet_Windows_x64.exe 2>/dev/null || true
            fi

            WIN_MSI=$(find . -name "*.msi" -type f 2>/dev/null | head -1)
            if [ -n "$WIN_MSI" ]; then
              ln -sf "$WIN_MSI" pc_clinet_Windows_x64.msi 2>/dev/null || true
            fi

            # macOS
            MAC_DMG=$(find . -name "*.dmg" -type f 2>/dev/null | head -1)
            if [ -n "$MAC_DMG" ]; then
              ln -sf "$MAC_DMG" pc_clinet_macOS_x64.dmg 2>/dev/null || true
            fi

            # Linux
            LINUX_APPIMAGE=$(find . -name "*.AppImage" -type f 2>/dev/null | head -1)
            if [ -n "$LINUX_APPIMAGE" ]; then
              ln -sf "$LINUX_APPIMAGE" pc_clinet_Linux_x64.AppImage 2>/dev/null || true
            fi

            LINUX_DEB=$(find . -name "*.deb" -type f 2>/dev/null | head -1)
            if [ -n "$LINUX_DEB" ]; then
              ln -sf "$LINUX_DEB" pc_clinet_Linux_x64.deb 2>/dev/null || true
            fi

            echo "=== Deployed files ==="
            ls -lh /opt/downloads/latest/
SCRIPT

      - name: Print result
        run: |
          echo "✅ 部署完成: https://riji.grasslandstarrysky.top/downloads/latest/"
          echo "版本: ${GITHUB_REF_NAME}"
