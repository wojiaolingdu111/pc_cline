name: Build Desktop Installers

on:
    push:
        tags:
            - v*
    workflow_dispatch:

permissions:
    contents: write

env:
    QSHELL_VER: v2.19.7

jobs:
    build:
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      bundles: deb,rpm,appimage
                      qshell_asset: qshell-v2.19.7-linux-amd64.tar.gz
                      qshell_bin: qshell
                      platform: linux

                    - os: windows-latest
                      bundles: nsis,msi
                      qshell_asset: qshell-v2.19.7-windows-amd64.zip
                      qshell_bin: qshell.exe
                      platform: windows

                    - os: macos-latest
                      bundles: dmg,app
                      qshell_asset: qshell-v2.19.7-darwin-amd64.tar.gz
                      qshell_bin: qshell
                      platform: macos

        runs-on: ${{ matrix.os }}

        steps:
            - uses: actions/checkout@v4

            - name: Install Linux system deps
              if: runner.os == 'Linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    libwebkit2gtk-4.1-dev build-essential curl wget file \
                    libxdo-dev libssl-dev libayatana-appindicator3-dev \
                    librsvg2-dev libfuse2 patchelf

            - uses: actions/setup-node@v4
              with:
                  node-version: 20

            - uses: pnpm/action-setup@v4
              with:
                  version: 10

            - uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - uses: dtolnay/rust-toolchain@stable

            - uses: Swatinem/rust-cache@v2
              with:
                  workspaces: src-tauri

            - run: pnpm install --frozen-lockfile

            - run: pnpm build

            - name: Build Python sidecar
              run: |
                  pip install pyinstaller
                  cd python-backend
                  python -m PyInstaller aitoreder-backend.spec --clean --distpath ../src-tauri/binaries

            - run: pnpm exec tauri build --bundles ${{ matrix.bundles }}

            - name: Download & extract qshell
              shell: bash
              run: |
                  if [ "${{ runner.os }}" = "Windows" ]; then
                    # Windows: use PowerShell for zip
                    pwsh -Command "
                      \$asset = '${{ matrix.qshell_asset }}'
                      \$url = 'https://github.com/qiniu/qshell/releases/download/\${{ env.QSHELL_VER }}/\$asset'
                      curl.exe -sL -o \"\$env:TEMP\\\$asset\" \$url
                      Expand-Archive -Path \"\$env:TEMP\\\$asset\" -DestinationPath \$env:TEMP -Force
                    "
                    echo "QSHELL_PATH=$env:TEMP\\${{ matrix.qshell_bin }}" >> $GITHUB_ENV
                  else
                    curl -sL -o /tmp/${{ matrix.qshell_asset }} \
                      "https://github.com/qiniu/qshell/releases/download/${{ env.QSHELL_VER }}/${{ matrix.qshell_asset }}"
                    tar xzf /tmp/${{ matrix.qshell_asset }} -C /tmp/
                    chmod +x /tmp/${{ matrix.qshell_bin }}
                    echo "QSHELL_PATH=/tmp/${{ matrix.qshell_bin }}" >> $GITHUB_ENV
                  fi

            - name: Upload to Qiniu
              shell: bash
              env:
                  QINIU_AK: ${{ secrets.QINIU_AK }}
                  QINIU_SK: ${{ secrets.QINIU_SK }}
                  QINIU_BUCKET: ${{ secrets.QINIU_BUCKET }}
              run: |
                  TAG="${GITHUB_REF_NAME}"
                  "${QSHELL_PATH}" account "${QINIU_AK}" "${QINIU_SK}" ci-user

                  upload() {
                    local src="$1" tag_path="$2" latest_path="$3"
                    "${QSHELL_PATH}" rput "${QINIU_BUCKET}" "${tag_path}" "$src"
                    "${QSHELL_PATH}" rput "${QINIU_BUCKET}" "${latest_path}" "$src" --overwrite
                    echo "Uploaded: ${tag_path}  +  ${latest_path}"
                  }

                  case "${{ runner.os }}" in
                    Linux)
                      for f in src-tauri/target/release/bundle/deb/*.deb; do
                        [ -f "$f" ] && upload "$f" "pc-clinet/${TAG}/linux/$(basename "$f")" "pc-clinet/latest/linux/AI_ToReder_linux_x86_64.deb"
                      done
                      for f in src-tauri/target/release/bundle/rpm/*.rpm; do
                        [ -f "$f" ] && upload "$f" "pc-clinet/${TAG}/linux/$(basename "$f")" "pc-clinet/latest/linux/AI_ToReder_linux_x86_64.rpm"
                      done
                      for f in src-tauri/target/release/bundle/appimage/*.AppImage; do
                        [ -f "$f" ] && upload "$f" "pc-clinet/${TAG}/linux/$(basename "$f")" "pc-clinet/latest/linux/AI_ToReder_linux_x86_64.AppImage"
                      done
                      ;;
                    Windows)
                      for f in src-tauri/target/release/bundle/nsis/*.exe; do
                        [ -f "$f" ] && upload "$f" "pc-clinet/${TAG}/windows/$(basename "$f")" "pc-clinet/latest/windows/AI_ToReder_windows_x86_64.exe"
                      done
                      for f in src-tauri/target/release/bundle/msi/*.msi; do
                        [ -f "$f" ] && upload "$f" "pc-clinet/${TAG}/windows/$(basename "$f")" "pc-clinet/latest/windows/AI_ToReder_windows_x86_64.msi"
                      done
                      ;;
                    macOS)
                      for f in src-tauri/target/release/bundle/dmg/*.dmg; do
                        [ -f "$f" ] && upload "$f" "pc-clinet/${TAG}/macos/$(basename "$f")" "pc-clinet/latest/macos/AI_ToReder_macos_x86_64.dmg"
                      done
                      for f in src-tauri/target/release/bundle/macos/*.tar.gz; do
                        [ -f "$f" ] && upload "$f" "pc-clinet/${TAG}/macos/$(basename "$f")" "pc-clinet/latest/macos/AI_ToReder_macos_x86_64.app.tar.gz"
                      done
                      ;;
                  esac
