name: Build Desktop Installers

on:
    push:
        tags:
            - v*
    workflow_dispatch:

permissions:
    contents: write

env:
    QSHELL_VER: v2.19.7

jobs:
    build:
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      bundles: deb,rpm,appimage
                      qshell_asset: qshell-v2.19.7-linux-amd64.tar.gz
                      qshell_bin: qshell
                      platform: linux

                    - os: windows-latest
                      bundles: nsis,msi
                      qshell_asset: qshell-v2.19.7-windows-amd64.zip
                      qshell_bin: qshell.exe
                      platform: windows

                    - os: macos-latest
                      bundles: dmg,app
                      qshell_asset: qshell-v2.19.7-darwin-amd64.tar.gz
                      qshell_bin: qshell
                      platform: macos

        runs-on: ${{ matrix.os }}

        steps:
            - uses: actions/checkout@v4

            - name: Install Linux system deps
              if: runner.os == 'Linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    libwebkit2gtk-4.1-dev build-essential curl wget file \
                    libxdo-dev libssl-dev libayatana-appindicator3-dev \
                    librsvg2-dev libfuse2 patchelf

            - uses: actions/setup-node@v4
              with:
                  node-version: 20

            - uses: pnpm/action-setup@v4
              with:
                  version: 10

            - uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - uses: dtolnay/rust-toolchain@stable

            - uses: Swatinem/rust-cache@v2
              with:
                  workspaces: src-tauri

            - run: pnpm install --frozen-lockfile

            - run: pnpm build

            - name: Build Python sidecar
              run: |
                  pip install pyinstaller
                  cd python-backend
                  python -m PyInstaller aitoreder-backend.spec --clean --distpath ../src-tauri/binaries

            - run: pnpm exec tauri build --bundles ${{ matrix.bundles }}

            - name: Download & extract qshell
              shell: bash
              run: |
                  if [ "${{ runner.os }}" = "Windows" ]; then
                    # Windows: use PowerShell for zip
                    pwsh -Command "
                      \$asset = '${{ matrix.qshell_asset }}'
                      \$url = 'https://github.com/qiniu/qshell/releases/download/\${{ env.QSHELL_VER }}/\$asset'
                      curl.exe -sL -o \"\$env:TEMP\\\$asset\" \$url
                      Expand-Archive -Path \"\$env:TEMP\\\$asset\" -DestinationPath \$env:TEMP -Force
                    "
                    echo "QSHELL_PATH=$env:TEMP\\${{ matrix.qshell_bin }}" >> $GITHUB_ENV
                  else
                    curl -sL -o /tmp/${{ matrix.qshell_asset }} \
                      "https://github.com/qiniu/qshell/releases/download/${{ env.QSHELL_VER }}/${{ matrix.qshell_asset }}"
                    tar xzf /tmp/${{ matrix.qshell_asset }} -C /tmp/
                    chmod +x /tmp/${{ matrix.qshell_bin }}
                    echo "QSHELL_PATH=/tmp/${{ matrix.qshell_bin }}" >> $GITHUB_ENV
                  fi

            - name: Upload to Qiniu
              shell: bash
              env:
                  QINIU_AK: ${{ secrets.QINIU_AK }}
                  QINIU_SK: ${{ secrets.QINIU_SK }}
                  QINIU_BUCKET: ${{ secrets.QINIU_BUCKET }}
              run: |
                  TAG="${GITHUB_REF_NAME}"
                  "${QSHELL_PATH}" account "${QINIU_AK}" "${QINIU_SK}" ci-user

                  case "${{ runner.os }}" in
                    Linux)
                      find src-tauri/target/release/bundle \
                        \( -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' \) -type f | while read -r f; do
                        rel="${f#src-tauri/target/release/bundle/}"
                        echo "Uploading: linux/${rel}"
                        "${QSHELL_PATH}" rput "${QINIU_BUCKET}" "pc-clinet/${TAG}/linux/${rel}" "$f"
                      done
                      ;;
                    Windows)
                      find src-tauri/target/release/bundle \
                        \( -name '*.exe' -o -name '*.msi' \) -type f | while read -r f; do
                        rel="${f#src-tauri/target/release/bundle/}"
                        echo "Uploading: windows/${rel}"
                        "${QSHELL_PATH}" rput "${QINIU_BUCKET}" "pc-clinet/${TAG}/windows/${rel}" "$f"
                      done
                      ;;
                    macOS)
                      find src-tauri/target/release/bundle \
                        \( -name '*.dmg' -o -name '*.tar.gz' -o -name '*.app' \) -type f | while read -r f; do
                        rel="${f#src-tauri/target/release/bundle/}"
                        echo "Uploading: macos/${rel}"
                        "${QSHELL_PATH}" rput "${QINIU_BUCKET}" "pc-clinet/${TAG}/macos/${rel}" "$f"
                      done
                      ;;
                  esac
