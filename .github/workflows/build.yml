name: Build Desktop Installers

on:
    push:
        tags:
            - v*
    workflow_dispatch:

permissions:
    contents: write

env:
    QSHELL_VER: v2.19.7

jobs:
    build:
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      bundles: deb,rpm,appimage
                      qshell_asset: qshell-v2.19.7-linux-amd64.tar.gz
                      qshell_bin: qshell
                      platform: linux

                    - os: windows-latest
                      bundles: nsis,msi
                      qshell_asset: qshell-v2.19.7-windows-amd64.zip
                      qshell_bin: qshell.exe
                      platform: windows

                    - os: macos-latest
                      bundles: dmg,app
                      qshell_asset: qshell-v2.19.7-darwin-amd64.tar.gz
                      qshell_bin: qshell
                      platform: macos

        runs-on: ${{ matrix.os }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install Linux system deps
              if: runner.os == 'Linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    libwebkit2gtk-4.1-dev build-essential curl wget file \
                    libxdo-dev libssl-dev libayatana-appindicator3-dev \
                    librsvg2-dev libfuse2 patchelf

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Rust cache
              uses: Swatinem/rust-cache@v2
              with:
                  workspaces: src-tauri

            - name: Install frontend deps
              run: pnpm install --frozen-lockfile

            - name: Build frontend
              run: pnpm build

            - name: Build Python sidecar (Linux / macOS)
              if: runner.os != 'Windows'
              run: |
                  pip install pyinstaller
                  cd python-backend
                  python -m PyInstaller aitoreder-backend.spec --clean --distpath ../src-tauri/binaries

            - name: Build Python sidecar (Windows)
              if: runner.os == 'Windows'
              shell: pwsh
              run: |
                  pip install pyinstaller
                  cd python-backend
                  python -m PyInstaller aitoreder-backend.spec --clean --distpath ../src-tauri/binaries

            - name: Build Tauri bundles
              run: pnpm exec tauri build --bundles ${{ matrix.bundles }}

            - name: Download qshell
              shell: bash
              run: |
                  curl -sL -o /tmp/qshell_asset \
                    "https://github.com/qiniu/qshell/releases/download/${{ env.QSHELL_VER }}/${{ matrix.qshell_asset }}"

            - name: Extract qshell (tar.gz)
              if: runner.os != 'Windows'
              shell: bash
              run: |
                  tar xzf /tmp/qshell_asset -C /tmp/
                  chmod +x /tmp/${{ matrix.qshell_bin }}

            - name: Extract qshell (zip)
              if: runner.os == 'Windows'
              shell: pwsh
              run: |
                  Expand-Archive -Path /tmp/qshell_asset -DestinationPath /tmp/
                  chmod +x /tmp/${{ matrix.qshell_bin }}

            - name: Upload to Qiniu
              shell: bash
              env:
                  QINIU_AK: ${{ secrets.QINIU_AK }}
                  QINIU_SK: ${{ secrets.QINIU_SK }}
                  QINIU_BUCKET: ${{ secrets.QINIU_BUCKET }}
                  QSHELL: /tmp/${{ matrix.qshell_bin }}
              run: |
                  TAG="${GITHUB_REF_NAME}"
                  "${QSHELL}" account "${QINIU_AK}" "${QINIU_SK}" ci-user

                  find src-tauri/target/release/bundle -type f | while read -r f; do
                    rel="${f#src-tauri/target/release/bundle/}"
                    echo "Uploading: ${PLATFORM}/${rel}"
                    "${QSHELL}" rput "${QINIU_BUCKET}" "pc-clinet/${TAG}/${{ matrix.platform }}/${rel}" "$f"
                  done
